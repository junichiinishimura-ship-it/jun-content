<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>無料特典管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #ff0000;
            --secondary-color: #282828;
            --accent-color: #065fd4;
            --bonus-color: #ff0000;
            --bonus-light: #fff5f5;
            --bonus-border: #ffcccc;
        }

        body { background: #f8f9fa; font-family: 'Noto Sans JP', sans-serif; }

        /* ナビバー */
        .navbar { background-color: var(--secondary-color); box-shadow: 0 2px 4px rgba(0,0,0,.1); }
        .navbar-brand { color: white !important; font-weight: bold; }

        /* カード共通 */
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.09); }

        /* グループカード */
        .group-card {
            border-left: 4px solid var(--bonus-color) !important;
            cursor: pointer;
            transition: transform .18s, box-shadow .18s;
        }
        .group-card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.12); }
        .group-card.active-group {
            background: var(--bonus-light);
            box-shadow: 0 0 0 2px var(--bonus-color), 0 4px 16px rgba(142,68,173,.15);
        }
        .group-card.dragging { opacity: .4; }
        .group-card.drag-over { outline: 2px dashed var(--bonus-color); background: var(--bonus-light); }

        /* 特典カード */
        .bonus-card {
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            gap: 14px;
            align-items: flex-start;
            transition: box-shadow .15s, background .15s;
        }
        .bonus-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.1); background: #fdfcff; }
        .bonus-card.dragging { opacity: .4; }
        .bonus-card.drag-over { border-color: var(--bonus-color); background: var(--bonus-light); }

        /* サムネイル */
        .bonus-thumb {
            width: 100px;
            height: 70px;
            object-fit: cover;
            border-radius: 8px;
            flex-shrink: 0;
            background: #f0f0f0;
            cursor: pointer;
            transition: opacity .15s;
        }
        .bonus-thumb:hover { opacity: .85; }
        .bonus-thumb-placeholder {
            width: 100px;
            height: 70px;
            border-radius: 8px;
            flex-shrink: 0;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #adb5bd;
            font-size: 1.5rem;
        }

        /* ドラッグハンドル */
        .drag-handle {
            cursor: grab;
            color: #adb5bd;
            font-size: 1.1rem;
            flex-shrink: 0;
            padding: 2px 4px;
        }
        .drag-handle:active { cursor: grabbing; }

        /* アクションボタン */
        .action-btn {
            transition: transform .15s, box-shadow .15s;
            border-radius: 7px !important;
        }
        .action-btn:hover { transform: translateY(-2px) scale(1.1); box-shadow: 0 4px 10px rgba(0,0,0,.12); }
        .action-btn:active { transform: scale(.95); }

        /* 空状態 */
        .empty-state { text-align: center; padding: 56px 20px; color: #adb5bd; }
        .empty-state i { font-size: 3rem; display: block; margin-bottom: 12px; }

        /* フォーム */
        .form-control:focus, .form-select:focus {
            border-color: var(--bonus-color);
            box-shadow: 0 0 0 .2rem rgba(142,68,173,.2);
        }
        .modal-header { background-color: var(--secondary-color); color: white; }

        /* サムネプレビュー */
        #thumbPreview { width: 160px; height: 110px; object-fit: cover; border-radius: 8px; display: none; border: 1px solid #dee2e6; }

        @media (max-width: 576px) {
            .bonus-card { flex-wrap: wrap; }
            .bonus-thumb, .bonus-thumb-placeholder { width: 100%; height: 120px; }
        }

        /* ショートカットヒント */
        .shortcut-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(40,40,40,0.85);
            color: #fff;
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 0.78rem;
            z-index: 1000;
            pointer-events: none;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        }
        .shortcut-hint kbd {
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            padding: 1px 6px;
            font-family: monospace;
        }
    </style>
    <script src="js/auth.js"></script>
</head>
<body>

    <!-- ナビバー -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="bi bi-gift me-2"></i>無料特典管理
            </a>
            <div class="d-flex gap-2 flex-wrap">
                <a href="index.html" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-youtube me-1"></i>YouTube管理
                </a>
                <a href="course.html" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-mortarboard me-1"></i>講座管理
                </a>
                <a href="links.html" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-link-45deg me-1"></i>リンクストック
                </a>
                <a href="editors.html" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-people me-1"></i>編集者
                </a>
                <div class="vr bg-secondary opacity-50 mx-1"></div>
                <button class="btn btn-outline-warning btn-sm" onclick="backupToExcel()" title="全データをExcelでバックアップ">
                    <i class="bi bi-download me-1"></i>バックアップ
                </button>
                <button class="btn btn-outline-info btn-sm" onclick="restoreFromExcel()" title="Excelファイルからリストア">
                    <i class="bi bi-upload me-1"></i>リストア
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <!-- サマリー -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title mb-3">サマリー</h5>
                        <div class="row text-center g-2">
                            <div class="col-6 col-md-3">
                                <div class="text-muted small">グループ数</div>
                                <div class="h4 fw-bold" id="sum-groups" style="color:var(--bonus-color)">0</div>
                            </div>
                            <div class="col-6 col-md-3">
                                <div class="text-muted small">特典総数</div>
                                <div class="h4 fw-bold text-dark" id="sum-items">0</div>
                            </div>
                            <div class="col-6 col-md-3">
                                <div class="text-muted small">URL設定済み</div>
                                <div class="h4 fw-bold text-success" id="sum-with-url">0</div>
                            </div>
                            <div class="col-6 col-md-3">
                                <div class="text-muted small">URL未設定</div>
                                <div class="h4 fw-bold text-warning" id="sum-no-url">0</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">

            <!-- 左カラム：グループ一覧 -->
            <div class="col-lg-4">
                <div class="card h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="bi bi-folder2 me-2"></i>特典グループ</h5>
                        <button class="btn btn-sm text-white" style="background:var(--bonus-color);" onclick="bonusManager.showAddGroupModal()">
                            <i class="bi bi-plus-circle me-1"></i>追加
                        </button>
                    </div>
                    <div class="card-body p-2" id="groupList">
                        <div class="empty-state" id="groupEmptyState">
                            <i class="bi bi-folder2-open"></i>
                            <div>グループがありません</div>
                            <small>「追加」からグループを作成してください</small>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右カラム：特典一覧 -->
            <div class="col-lg-8">
                <div class="card">
                    <!-- 未選択 -->
                    <div id="noGroupSelected">
                        <div class="card-body empty-state" style="padding:80px 20px;">
                            <i class="bi bi-arrow-left-circle"></i>
                            <div class="fs-5 fw-semibold mb-1">グループを選択してください</div>
                            <small>左のグループ一覧からグループを選ぶと特典が表示されます</small>
                        </div>
                    </div>

                    <!-- 選択後 -->
                    <div id="groupDetail" style="display:none;">
                        <div class="card-header d-flex justify-content-between align-items-start gap-2 flex-wrap">
                            <div>
                                <h5 class="mb-0" id="detailGroupTitle">グループ名</h5>
                                <small class="text-muted" id="detailGroupDesc"></small>
                            </div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-sm btn-outline-secondary action-btn"
                                    onclick="bonusManager.editGroup(bonusManager.selectedGroupId)"
                                    data-tooltip="グループ情報を編集">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-sm text-white action-btn"
                                    style="background:var(--bonus-color);"
                                    onclick="bonusManager.showAddItemModal()"
                                    data-tooltip="このグループに特典を追加">
                                    <i class="bi bi-plus-circle me-1"></i>特典を追加
                                </button>
                            </div>
                        </div>
                        <div class="card-body" id="itemList">
                            <div class="empty-state" id="itemEmptyState">
                                <i class="bi bi-gift"></i>
                                <div>特典がありません</div>
                                <small>「特典を追加」から登録してください</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== グループ追加・編集モーダル ===== -->
    <div class="modal fade" id="groupModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="groupModalTitle">グループ追加</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="groupId">
                    <div class="mb-3">
                        <label class="form-label">グループ名 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="groupTitle" placeholder="例：LINE登録特典">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">説明</label>
                        <textarea class="form-control" id="groupDescription" rows="3" placeholder="このグループの説明..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                    <button type="button" class="btn text-white" style="background:var(--bonus-color);" onclick="bonusManager.saveGroup()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 特典追加・編集モーダル ===== -->
    <div class="modal fade" id="itemModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="itemModalTitle">特典追加</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="itemId">
                    <input type="hidden" id="itemGroupId">
                    <div class="row g-3">
                        <div class="col-md-7">
                            <div class="mb-3">
                                <label class="form-label">特典名 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="itemTitle" placeholder="例：SNSマーケティング完全ガイドPDF">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">説明</label>
                                <textarea class="form-control" id="itemDescription" rows="3" placeholder="特典の説明..."></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">格納リンク（URL）</label>
                                <input type="url" class="form-control" id="itemContentUrl" placeholder="https://drive.google.com/...">
                            </div>
                        </div>
                        <div class="col-md-5">
                            <div class="mb-3">
                                <label class="form-label">サムネイルURL</label>
                                <input type="url" class="form-control" id="itemThumbnailUrl"
                                    placeholder="https://..."
                                    oninput="bonusManager.previewThumb()">
                                <div class="mt-2">
                                    <img id="thumbPreview" src="" alt="プレビュー">
                                    <div id="thumbPlaceholder" class="d-flex align-items-center justify-content-center mt-2"
                                        style="width:160px;height:110px;background:#f0f0f0;border-radius:8px;color:#adb5bd;font-size:2rem;">
                                        <i class="bi bi-image"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                    <button type="button" class="btn text-white" style="background:var(--bonus-color);" onclick="bonusManager.saveItem()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 削除確認モーダル ===== -->
    <div class="modal fade" id="deleteConfirmModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered" style="max-width:420px;">
            <div class="modal-content">
                <div class="modal-header" style="background:#c0392b;color:white;">
                    <h5 class="modal-title"><i class="bi bi-exclamation-triangle me-2"></i>削除の確認</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-1">以下を削除しますか？</p>
                    <p class="fw-bold text-danger" id="deleteTargetTitle"></p>
                    <p class="text-muted small mb-0" id="deleteTargetNote">この操作は元に戻せません。</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteBtn">
                        <i class="bi bi-trash me-1"></i>削除する
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ショートカットヒント（常時表示） -->
    <div class="shortcut-hint">
        <i class="bi bi-keyboard me-1"></i>
        <kbd>N</kbd> グループ追加
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="js/jsonbin.js"></script>
    <script src="js/backup.js"></script>
<script src="js/bonus.js"></script>
    <script>
        document.addEventListener('keydown', (e) => {
            if (document.querySelector('.modal.show')) return;
            if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
            if (e.key === 'n' && !e.ctrlKey && !e.metaKey) {
                e.preventDefault();
                bonusManager?.showAddGroupModal();
            }
        });
    </script>
</body>
</html>
